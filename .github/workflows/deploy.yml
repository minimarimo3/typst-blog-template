name: Test and deploy to GitHub Pages

env:
  TYPST_VERSION: 0.15.0
  PAGEFIND_VERSION: 1.5.2

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Typst
        run: |
          wget -q https://github.com/typst/typst/releases/download/v$TYPST_VERSION/typst-x86_64-unknown-linux-musl.tar.xz
          tar -xf typst-x86_64-unknown-linux-musl.tar.xz
          sudo mv typst-x86_64-unknown-linux-musl/typst /usr/local/bin/typst
          typst --version

      - name: Install fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Run unit tests
        run: python3 -m unittest discover -s vendor/typst-blog-core/dev -p 'test_*.py' -v

      - name: Check JavaScript modules
        run: |
          for js_file in vendor/typst-blog-core/static/scripts/*.js; do
            node --input-type=module --check < "$js_file"
          done

      - name: Build paged example
        if: ${{ hashFiles('example-post/index.typ') != '' }}
        run: typst compile --root . example-post/index.typ /tmp/example-post.pdf

      - name: Build site
        run: python3 command.py build

      - name: Build search index
        run: npx -y pagefind@$PAGEFIND_VERSION --site public

      - name: Configure Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    if: github.event_name != 'pull_request'
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
